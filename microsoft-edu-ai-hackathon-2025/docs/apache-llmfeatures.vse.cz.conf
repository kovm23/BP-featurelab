<VirtualHost *:80>
    ServerName llmfeatures.vse.cz

    DocumentRoot /var/www/llmfeatures/current
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 1200

    ErrorLog ${APACHE_LOG_DIR}/llmfeatures-error.log
    CustomLog ${APACHE_LOG_DIR}/llmfeatures-access.log combined

    # Browser vola stejny origin /api/* a Apache request preposle na interni backend.
    ProxyPass /api/ http://llm.vse.cz:5000/
    ProxyPassReverse /api/ http://llm.vse.cz:5000/

    <Directory /var/www/llmfeatures/current>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        DirectoryIndex index.html

        RewriteEngine On
        RewriteBase /

        RewriteRule ^api/ - [L]

        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        RewriteRule ^ index.html [L]
    </Directory>
</VirtualHost>
