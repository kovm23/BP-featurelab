name = "bpfeaturelab"
compatibility_date = "2025-01-01"
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[build]
command = "npm install && npm run build"

# Worker backend URL must be configured outside this file
# (Cloudflare dashboard env vars or `wrangler secret put`).
# Supported runtime bindings:
# - BACKEND_URL: primary backend URL, or comma-separated URL list.
# - BACKEND_URL_FALLBACK: optional fallback backend URL(s).
