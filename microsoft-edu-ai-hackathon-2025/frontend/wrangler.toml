name = "bpfeaturelab"
compatibility_date = "2025-01-01"
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[build]
command = "npm install && npm run build"

[vars]
# Set this to the currently running backend origin before deploying.
# Do not commit short-lived trycloudflare URLs here unless you are updating
# the production deployment in the same change.
BACKEND_URL = "https://battery-iso-texts-limousines.trycloudflare.com"
