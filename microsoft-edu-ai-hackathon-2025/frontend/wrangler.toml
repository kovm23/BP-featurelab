name = "bpfeaturelab"
compatibility_date = "2025-01-01"
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[build]
command = "npm install && npm run build"

[vars]
# Update BACKEND_URL whenever the cloudflared quick tunnel restarts
# (pm2 logs backend-tunnel | grep trycloudflare to get the new address).
BACKEND_URL = "https://saints-clear-plate-biographies.trycloudflare.com"
