name = "bpfeaturelab"
compatibility_date = "2025-01-01"
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[build]
command = "npm install && npm run build"

[vars]
# Update BACKEND_URL whenever the cloudflared quick tunnel restarts,
# then redeploy the Worker so API routes keep proxying correctly.
# Current quick tunnel created on 2026-04-13:
#   https://occasional-cheque-practice-fluid.trycloudflare.com
BACKEND_URL = "https://occasional-cheque-practice-fluid.trycloudflare.com"
