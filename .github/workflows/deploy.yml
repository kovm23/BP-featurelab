name: Deploy to production

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: microsoft-edu-ai-hackathon-2025/frontend/package-lock.json

      - name: Build frontend
        working-directory: microsoft-edu-ai-hackathon-2025/frontend
        run: npm ci && npm run build
        env:
          VITE_API_BASE: /api

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H llmfeatures.vse.cz >> ~/.ssh/known_hosts

      - name: Deploy frontend (rsync)
        run: |
          rsync -az --delete \
            microsoft-edu-ai-hackathon-2025/frontend/dist/ \
            ${{ secrets.DEPLOY_USER }}@llmfeatures.vse.cz:/var/www/llmfeatures/current/

      - name: Deploy backend (git pull + pm2 reload)
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@llmfeatures.vse.cz '
            cd ~/BP-featurelab/microsoft-edu-ai-hackathon-2025 &&
            git fetch origin &&
            git checkout prod &&
            git pull origin prod &&
            cd backend &&
            pm2 reload ecosystem.config.js --update-env
          '

      - name: Fix webroot permissions
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@llmfeatures.vse.cz \
            'sudo chown -R www-data:www-data /var/www/llmfeatures'
