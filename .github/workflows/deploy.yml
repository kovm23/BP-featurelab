name: Deploy to production

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        working-directory: microsoft-edu-ai-hackathon-2025/frontend
        run: npm ci && npm run build
        env:
          VITE_API_BASE: /api

      - name: Deploy frontend
        run: |
          sudo rsync -az --delete \
            microsoft-edu-ai-hackathon-2025/frontend/dist/ \
            /var/www/llmfeatures/current/
          sudo chown -R www-data:www-data /var/www/llmfeatures

      - name: Reload backend
        working-directory: microsoft-edu-ai-hackathon-2025/backend
        run: pm2 reload ecosystem.config.js --update-env
