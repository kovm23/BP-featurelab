name: Deploy to production

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        working-directory: microsoft-edu-ai-hackathon-2025/frontend
        run: npm ci && npm run build
        env:
          VITE_API_BASE: /api

      - name: Deploy frontend
        run: |
          sudo rsync -az --delete \
            microsoft-edu-ai-hackathon-2025/frontend/dist/ \
            /var/www/llmfeatures/current/
          sudo chown -R www-data:www-data /var/www/llmfeatures

      - name: Reload backend
        run: |
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.BACKEND_SSH_KEY }}"
          ssh -o StrictHostKeyChecking=no kovm23@llm.vse.cz "cd ~/BP-featurelab/microsoft-edu-ai-hackathon-2025/backend && git pull && pm2 reload ecosystem.config.js --update-env"
